name: Rust

on:
  push:
    paths: 
    - "**.rs"
    - "Cargo.toml"
    - ".github/workflows/rust.yml"
  pull_request:
  workflow_call:

env:
    CARGO_TERM_COLOR: always
    RUSTC_BOOTSTRAP: 1

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: 3.13
    - name: Run tests Python 3.13
      run: python -V && cargo test
    - uses: actions/setup-python@v6
      with:
        python-version: "3.x"
    - name: Run tests Python latest
      run: python -V && cargo test

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: fmt
      run: cargo fmt --check
    - name: clippy
      run: cargo clippy
